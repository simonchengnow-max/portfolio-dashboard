<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Dashboard | Simon Cheng</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="dashboard-header">
        <h1>Portfolio Dashboard</h1>
        <p class="subtitle">Real-time venture portfolio intelligence</p>
        <div class="last-updated">
            <span>Last Updated: <span id="update-timestamp">Loading...</span></span>
        </div>
    </header>

    <main class="dashboard-grid">
        <!-- Revenue Signals Section -->
        <section class="dashboard-section revenue-section">
            <div class="section-header">
                <h2>Revenue Signals</h2>
                <div class="status-indicator status-green"></div>
            </div>
            <div class="section-content" id="revenue-signals-content">
                <div class="loading">Loading...</div>
            </div>
        </section>

        <!-- Market Intelligence Section -->
        <section class="dashboard-section market-section">
            <div class="section-header">
                <h2>Market Intelligence</h2>
                <div class="status-indicator status-yellow"></div>
            </div>
            <div class="section-content" id="market-intel-content">
                <div class="loading">Loading...</div>
            </div>
        </section>

        <!-- Capital Markets Section -->
        <section class="dashboard-section capital-section">
            <div class="section-header">
                <h2>Capital Markets</h2>
                <div class="status-indicator status-green"></div>
            </div>
            <div class="section-content" id="capital-markets-content">
                <div class="loading">Loading...</div>
            </div>
        </section>

        <!-- Operational Health Section -->
        <section class="dashboard-section operational-section">
            <div class="section-header">
                <h2>Operational Health</h2>
                <div class="status-indicator status-red"></div>
            </div>
            <div class="section-content" id="operational-health-content">
                <div class="loading">Loading...</div>
            </div>
        </section>

        <!-- VC News Daily Section -->
        <section id="vc-news" class="card">
            <div class="card-header">
                <h2>💰 VC News Daily</h2>
                <div class="status-indicator"></div>
            </div>
            <div class="card-content">
                <div class="stats-row">
                    <div class="stat">
                        <span class="stat-label">Total Deals</span>
                        <span class="stat-value" id="vc-total-deals">-</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Total Capital</span>
                        <span class="stat-value" id="vc-total-capital">-</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Last Updated</span>
                        <span class="stat-value" id="vc-last-updated">-</span>
                    </div>
                </div>
                <div id="vc-hot-deals"></div>
                <div id="vc-warm-deals"></div>
            </div>
        </section>
    </main>

    <script src="modal.js"></script>
    <script src="app.js"></script>
</body>
</html>
